name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Framework
        uses: actions/checkout@v4
        with:
          path: adamant-ModpackFramework

      - name: Checkout Lib (test dependency)
        uses: actions/checkout@v4
        with:
          repository: h2-modpack/adamant-ModpackLib
          path: adamant-ModpackLib

      - name: Setup Lua
        uses: leafo/gh-actions-lua@v10
        with:
          luaVersion: "5.2"

      - name: Setup Luarocks
        uses: leafo/gh-actions-luarocks@v4

      - name: Install LuaUnit
        run: luarocks install luaunit

      - name: Run tests
        working-directory: adamant-ModpackFramework
        run: lua tests/all.lua
